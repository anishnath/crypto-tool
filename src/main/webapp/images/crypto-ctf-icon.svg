<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="lock" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1e1b4b" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="16" y="16" width="480" height="480" rx="80" ry="80" fill="url(#bg)"/>

  <!-- Matrix/cipher background -->
  <g font-family="monospace" font-size="14" fill="#fff" opacity="0.05">
    <text x="50" y="90">AES XOR RSA</text><text x="260" y="90">VIGENERE</text>
    <text x="60" y="120">CAESAR ROT13</text><text x="300" y="120">BIFID</text>
    <text x="40" y="150">PLAYFAIR</text><text x="250" y="150">AUTOKEY RC4</text>
    <text x="80" y="420">ADFGVX</text><text x="280" y="420">HILLCIPHER</text>
    <text x="50" y="450">OTP NIHILIST</text><text x="310" y="450">BEAUFORT</text>
  </g>

  <!-- Padlock body -->
  <rect x="176" y="230" width="160" height="128" rx="20" ry="20" fill="url(#lock)" filter="url(#shadow)"/>

  <!-- Padlock shackle -->
  <path d="M210 230 V188 C210 148 302 148 302 188 V230" fill="none" stroke="#a5b4fc" stroke-width="22" stroke-linecap="round"/>
  <path d="M210 230 V188 C210 148 302 148 302 188 V230" fill="none" stroke="#c7d2fe" stroke-width="14" stroke-linecap="round"/>

  <!-- Keyhole -->
  <circle cx="256" cy="280" r="16" fill="#312e81"/>
  <rect x="250" y="290" width="12" height="28" rx="4" fill="#312e81"/>

  <!-- Cipher wheel top-left -->
  <g transform="translate(100,180)" opacity="0.8">
    <circle cx="0" cy="0" r="32" fill="none" stroke="#c7d2fe" stroke-width="3"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#a5b4fc" stroke-width="2"/>
    <g font-family="monospace" font-size="10" fill="#e0e7ff" text-anchor="middle">
      <text x="0" y="-24">A</text><text x="24" y="4">G</text>
      <text x="0" y="30">M</text><text x="-24" y="4">T</text>
    </g>
    <line x1="0" y1="-18" x2="0" y2="-10" stroke="#00ff41" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Hash symbol top-right -->
  <g transform="translate(380,170)" opacity="0.8" filter="url(#shadow)">
    <text font-family="monospace" font-weight="700" font-size="40" fill="#c7d2fe" text-anchor="middle" y="14">#</text>
  </g>

  <!-- Pipeline arrows bottom -->
  <g transform="translate(140,400)" opacity="0.75">
    <rect x="0" y="0" width="52" height="24" rx="5" fill="#00ff41" opacity="0.15" stroke="#00ff41" stroke-width="1.2"/>
    <text x="26" y="16" text-anchor="middle" font-family="monospace" font-size="10" fill="#00ff41">b64</text>
    <text x="64" y="16" font-family="monospace" font-size="14" fill="#6366f1"></text>
    <rect x="80" y="0" width="52" height="24" rx="5" fill="#00ff41" opacity="0.15" stroke="#00ff41" stroke-width="1.2"/>
    <text x="106" y="16" text-anchor="middle" font-family="monospace" font-size="10" fill="#00ff41">xor</text>
    <text x="144" y="16" font-family="monospace" font-size="14" fill="#6366f1"></text>
    <rect x="160" y="0" width="52" height="24" rx="5" fill="#00ff41" opacity="0.15" stroke="#00ff41" stroke-width="1.2"/>
    <text x="186" y="16" text-anchor="middle" font-family="monospace" font-size="10" fill="#00ff41">aes</text>
  </g>

  <!-- Flag tag bottom-right -->
  <g transform="translate(370,390)" opacity="0.85">
    <rect x="0" y="0" width="64" height="28" rx="6" fill="#00ff41" opacity="0.2" stroke="#00ff41" stroke-width="1.5"/>
    <text x="32" y="19" text-anchor="middle" font-family="monospace" font-weight="700" font-size="13" fill="#00ff41">FLAG</text>
  </g>

  <!-- Subtle CRYPTO watermark -->
  <text x="256" y="475" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="34" fill="#fff" opacity="0.1" letter-spacing="10">CRYPTO</text>
</svg>
