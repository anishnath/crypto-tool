<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="lock" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e0e7ff" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1e3a8a" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="80" ry="80" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06">
    <line x1="96" y1="16" x2="96" y2="496" stroke="#fff" stroke-width="1"/>
    <line x1="176" y1="16" x2="176" y2="496" stroke="#fff" stroke-width="1"/>
    <line x1="256" y1="16" x2="256" y2="496" stroke="#fff" stroke-width="1"/>
    <line x1="336" y1="16" x2="336" y2="496" stroke="#fff" stroke-width="1"/>
    <line x1="416" y1="16" x2="416" y2="496" stroke="#fff" stroke-width="1"/>
    <line x1="16" y1="96" x2="496" y2="96" stroke="#fff" stroke-width="1"/>
    <line x1="16" y1="176" x2="496" y2="176" stroke="#fff" stroke-width="1"/>
    <line x1="16" y1="256" x2="496" y2="256" stroke="#fff" stroke-width="1"/>
    <line x1="16" y1="336" x2="496" y2="336" stroke="#fff" stroke-width="1"/>
    <line x1="16" y1="416" x2="496" y2="416" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Shield shape -->
  <path d="M256 72 L400 130 C400 130 410 290 256 420 C102 290 112 130 112 130 Z"
        fill="url(#shield)" filter="url(#shadow)" stroke="#bfdbfe" stroke-width="2"/>

  <!-- Lock body -->
  <rect x="200" y="220" width="112" height="96" rx="12" ry="12" fill="url(#lock)"/>

  <!-- Lock shackle -->
  <path d="M224 220 V185 C224 155 288 155 288 185 V220"
        fill="none" stroke="#f59e0b" stroke-width="18" stroke-linecap="round"/>
  <path d="M224 220 V185 C224 155 288 155 288 185 V220"
        fill="none" stroke="#fbbf24" stroke-width="12" stroke-linecap="round"/>

  <!-- Keyhole -->
  <circle cx="256" cy="258" r="14" fill="#92400e"/>
  <rect x="251" y="264" width="10" height="24" rx="3" fill="#92400e"/>

  <!-- Certificate/key icon bottom-left -->
  <g transform="translate(108, 310)" opacity="0.9">
    <rect x="0" y="0" width="48" height="60" rx="6" fill="#fff" opacity="0.85"/>
    <line x1="10" y1="14" x2="38" y2="14" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
    <line x1="10" y1="26" x2="32" y2="26" stroke="#93c5fd" stroke-width="3" stroke-linecap="round"/>
    <line x1="10" y1="38" x2="36" y2="38" stroke="#93c5fd" stroke-width="3" stroke-linecap="round"/>
    <circle cx="34" cy="50" r="7" fill="none" stroke="#22c55e" stroke-width="2.5"/>
    <polyline points="30,50 33,53 38,47" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Key icon bottom-right -->
  <g transform="translate(350, 320)" opacity="0.9">
    <circle cx="20" cy="16" r="16" fill="none" stroke="#fff" stroke-width="4" opacity="0.85"/>
    <line x1="36" y1="16" x2="68" y2="16" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
    <line x1="58" y1="16" x2="58" y2="28" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
    <line x1="50" y1="16" x2="50" y2="24" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
  </g>

  <!-- Chain links top-right -->
  <g transform="translate(340, 100)" opacity="0.7">
    <ellipse cx="16" cy="12" rx="14" ry="10" fill="none" stroke="#fff" stroke-width="3.5"/>
    <ellipse cx="36" cy="12" rx="14" ry="10" fill="none" stroke="#fff" stroke-width="3.5"/>
  </g>

  <!-- Text: JKS -->
  <text x="256" y="155" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="42" fill="#1e3a8a" opacity="0.7" letter-spacing="6">JKS</text>
</svg>
