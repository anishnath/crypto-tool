<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="prism" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.20"/>
    </linearGradient>
    <linearGradient id="mirrorG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="lensG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#334155" stroke-width="0.5" opacity="0.25">
    <line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="100" y1="60" x2="100" y2="500"/>
    <line x1="200" y1="60" x2="200" y2="500"/>
    <line x1="300" y1="60" x2="300" y2="500"/>
    <line x1="400" y1="60" x2="400" y2="500"/>
    <line x1="500" y1="60" x2="500" y2="500"/>
    <line x1="600" y1="60" x2="600" y2="500"/>
    <line x1="700" y1="60" x2="700" y2="500"/>
    <line x1="800" y1="60" x2="800" y2="500"/>
    <line x1="900" y1="60" x2="900" y2="500"/>
  </g>

  <!-- === Scene: Prism dispersion + curved mirror + lens === -->

  <!-- Parallel beam (white light) -->
  <g stroke="#fbbf24" stroke-width="1.8" opacity="0.9">
    <line x1="60" y1="230" x2="310" y2="230"/>
    <line x1="60" y1="250" x2="310" y2="250"/>
    <line x1="60" y1="270" x2="310" y2="270"/>
    <line x1="60" y1="290" x2="310" y2="290"/>
    <line x1="60" y1="310" x2="310" y2="310"/>
  </g>
  <!-- Source arrows -->
  <g fill="#fbbf24" opacity="0.9">
    <polygon points="60,225 60,235 45,230"/>
    <polygon points="60,265 60,275 45,270"/>
    <polygon points="60,305 60,315 45,310"/>
  </g>

  <!-- Prism -->
  <polygon points="340,160 460,380 220,380" fill="url(#prism)" stroke="#0ea5e9" stroke-width="2.5"/>
  <text x="340" y="320" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#64748b" font-weight="600">n=1.52</text>

  <!-- Dispersed rays (rainbow) -->
  <g stroke-width="1.5" opacity="0.85">
    <line x1="420" y1="210" x2="620" y2="130" stroke="#8b5cf6"/>
    <line x1="425" y1="225" x2="630" y2="155" stroke="#3b82f6"/>
    <line x1="430" y1="245" x2="640" y2="185" stroke="#22d3ee"/>
    <line x1="433" y1="265" x2="650" y2="220" stroke="#22c55e"/>
    <line x1="436" y1="285" x2="660" y2="260" stroke="#eab308"/>
    <line x1="438" y1="300" x2="665" y2="290" stroke="#f97316"/>
    <line x1="440" y1="315" x2="670" y2="320" stroke="#ef4444"/>
  </g>

  <!-- Glow on dispersed rays -->
  <g filter="url(#glow)" opacity="0.3">
    <line x1="420" y1="210" x2="620" y2="130" stroke="#8b5cf6" stroke-width="3"/>
    <line x1="433" y1="265" x2="650" y2="220" stroke="#22c55e" stroke-width="3"/>
    <line x1="440" y1="315" x2="670" y2="320" stroke="#ef4444" stroke-width="3"/>
  </g>

  <!-- Curved mirror (right side) -->
  <path d="M 830,120 Q 870,280 830,440" fill="none" stroke="url(#mirrorG)" stroke-width="3"/>
  <!-- Mirror hatching -->
  <g stroke="#475569" stroke-width="1" opacity="0.5">
    <line x1="833" y1="140" x2="843" y2="130"/>
    <line x1="837" y1="180" x2="847" y2="170"/>
    <line x1="840" y1="220" x2="850" y2="210"/>
    <line x1="841" y1="260" x2="851" y2="250"/>
    <line x1="841" y1="300" x2="851" y2="290"/>
    <line x1="840" y1="340" x2="850" y2="330"/>
    <line x1="837" y1="380" x2="847" y2="370"/>
    <line x1="833" y1="420" x2="843" y2="410"/>
  </g>

  <!-- Reflected rays from mirror -->
  <g stroke="#38bdf8" stroke-width="1.3" opacity="0.7">
    <line x1="830" y1="180" x2="720" y2="220"/>
    <line x1="835" y1="230" x2="720" y2="260"/>
    <line x1="840" y1="280" x2="720" y2="280"/>
    <line x1="835" y1="330" x2="720" y2="300"/>
    <line x1="830" y1="380" x2="720" y2="340"/>
  </g>

  <!-- Focal point -->
  <circle cx="720" cy="280" r="4" fill="#22c55e"/>
  <circle cx="720" cy="280" r="8" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.4"/>
  <text x="720" y="268" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#22c55e">F</text>

  <!-- Ideal lens (bottom-left scene) -->
  <line x1="580" y1="370" x2="580" y2="490" stroke="#a78bfa" stroke-width="2.5"/>
  <!-- Arrow tips on lens -->
  <polygon points="572,378 580,370 588,378" fill="#a78bfa"/>
  <polygon points="572,482 580,490 588,482" fill="#a78bfa"/>
  <!-- Lens fill -->
  <rect x="576" y="375" width="8" height="110" fill="url(#lensG)" rx="4"/>

  <!-- Point source rays through lens -->
  <g stroke="#fbbf24" stroke-width="1.2" opacity="0.65">
    <line x1="480" y1="430" x2="578" y2="400"/>
    <line x1="480" y1="430" x2="578" y2="430"/>
    <line x1="480" y1="430" x2="578" y2="460"/>
    <!-- After lens (converging) -->
    <line x1="582" y1="400" x2="680" y2="430"/>
    <line x1="582" y1="430" x2="680" y2="430"/>
    <line x1="582" y1="460" x2="680" y2="430"/>
  </g>
  <!-- Point source dot -->
  <circle cx="480" cy="430" r="5" fill="#fbbf24"/>
  <!-- Image dot -->
  <circle cx="680" cy="430" r="4" fill="#f59e0b" opacity="0.8"/>

  <!-- Labels -->
  <text x="340" y="148" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#64748b" font-weight="600">PRISM</text>
  <text x="850" y="108" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#64748b" font-weight="600">CONCAVE MIRROR</text>
  <text x="580" y="508" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#64748b" font-weight="600">IDEAL LENS</text>

  <!-- Feature badges (top-right) -->
  <rect x="940" y="80" width="225" height="220" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="960" y="106" font-family="Inter, sans-serif" font-size="11" fill="#64748b" font-weight="700" letter-spacing="0.05em">SIMULATOR FEATURES</text>
  <line x1="950" y1="116" x2="1155" y2="116" stroke="#334155" stroke-width="1"/>

  <text x="960" y="140" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">Objects</text>
  <text x="1155" y="140" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="13" fill="#22c55e" font-weight="600">19 types</text>

  <text x="960" y="165" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">Presets</text>
  <text x="1155" y="165" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="13" fill="#22c55e" font-weight="600">22 scenes</text>

  <text x="960" y="190" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">Physics</text>
  <text x="1155" y="190" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="13" fill="#0ea5e9" font-weight="600">Snell + Fresnel</text>

  <text x="960" y="215" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">Dispersion</text>
  <text x="1155" y="215" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="13" fill="#0ea5e9" font-weight="600">Cauchy eq.</text>

  <text x="960" y="240" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">Undo/Redo</text>
  <text x="1155" y="240" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="13" fill="#a78bfa" font-weight="600">40 states</text>

  <text x="960" y="265" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">Export</text>
  <text x="1155" y="265" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="13" fill="#a78bfa" font-weight="600">JSON + PNG</text>

  <text x="960" y="290" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">GRIN Media</text>
  <text x="1155" y="290" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="13" fill="#f59e0b" font-weight="600">Euler trace</text>

  <!-- Title bar -->
  <text x="600" y="560" text-anchor="middle" font-family="Inter, sans-serif" font-size="30" fill="#e2e8f0" font-weight="700">Ray Optics Simulator</text>
  <text x="600" y="588" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" fill="#94a3b8">Freeform 2D Ray Tracing &amp; Optical Bench  |  Mirrors, Lenses, Prisms, Gratings</text>

  <!-- Brand -->
  <text x="1160" y="612" text-anchor="end" font-family="Inter, sans-serif" font-size="14" fill="#475569" font-weight="600">8gwifi.org</text>
</svg>
