<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="-apple-system,'Segoe UI',Roboto,'Helvetica Neue',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#140f24"/>
      <stop offset="1" stop-color="#0b0916"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.0" r="0.9">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="430" fill="url(#glow)"/>

  <!-- ===== Top bar ===== -->
  <rect x="0" y="0" width="1200" height="96" fill="#1a1430"/>
  <rect x="0" y="95" width="1200" height="1" fill="#2e2747"/>

  <!-- Logo: violet rounded square with padlock -->
  <rect x="40" y="25" width="46" height="46" rx="12" fill="url(#violet)"/>
  <rect x="52" y="46" width="22" height="16" rx="3" fill="#ffffff"/>
  <path d="M57 46 V41 a6 6 0 0 1 12 0 V46" fill="none" stroke="#ffffff" stroke-width="3"/>
  <circle cx="63" cy="53" r="2.2" fill="#7c3aed"/>

  <!-- Title -->
  <text x="102" y="47" font-size="30" fill="#ffffff" font-weight="700">Fernet Encrypt &amp; Decrypt</text>
  <text x="103" y="74" font-size="16" fill="#b6a9e0">Generate keys &#183; encrypt &amp; decrypt tokens &#183; AES-128-CBC + HMAC-SHA256</text>

  <!-- Python-compatible badge -->
  <rect x="1006" y="30" width="154" height="38" rx="9" fill="#2a1f47" stroke="#463673"/>
  <circle cx="1034" cy="49" r="5" fill="#a855f7"/>
  <text x="1050" y="54" font-size="15" fill="#d6c9ff" font-weight="600">Python compatible</text>

  <!-- ============ LEFT CARD: input ============ -->
  <rect x="40" y="126" width="556" height="406" rx="14" fill="#1c1530" stroke="#342a50"/>
  <rect x="40" y="126" width="556" height="46" rx="14" fill="#6d28d9"/>
  <rect x="40" y="158" width="556" height="14" fill="#6d28d9"/>
  <rect x="62" y="141" width="15" height="11" rx="2" fill="#fff"/>
  <path d="M65 141 V138 a4.5 4.5 0 0 1 9 0 V141" fill="none" stroke="#fff" stroke-width="2"/>
  <text x="86" y="156" font-size="17" fill="#ffffff" font-weight="700">Fernet Tool</text>

  <!-- Mode toggle -->
  <rect x="66" y="188" width="504" height="38" rx="9" fill="#241c3a" stroke="#342a50"/>
  <rect x="68" y="190" width="250" height="34" rx="7" fill="url(#violet)"/>
  <text x="193" y="213" font-size="15" fill="#ffffff" font-weight="700" text-anchor="middle">Encrypt</text>
  <text x="444" y="213" font-size="15" fill="#9b8cc4" font-weight="600" text-anchor="middle">Decrypt</text>

  <!-- Key field -->
  <text x="66" y="258" font-size="12" fill="#8b7cb8" font-weight="700" letter-spacing="1.2">FERNET KEY</text>
  <rect x="66" y="266" width="376" height="40" rx="8" fill="#14101f" stroke="#352b52"/>
  <text x="80" y="291" font-size="13.5" fill="#c9bbed" font-family="'SF Mono','Menlo','Consolas',monospace">cJ8nKp2_aQ4vR7xT1mWfZ0bH9dL...</text>
  <rect x="450" y="266" width="58" height="40" rx="8" fill="#241c3a" stroke="#352b52"/>
  <text x="479" y="291" font-size="13" fill="#c4b6e8" text-anchor="middle" font-weight="600">Gen</text>
  <rect x="514" y="266" width="56" height="40" rx="8" fill="#241c3a" stroke="#352b52"/>
  <text x="542" y="291" font-size="13" fill="#c4b6e8" text-anchor="middle" font-weight="600">Copy</text>

  <!-- Message field -->
  <text x="66" y="340" font-size="12" fill="#8b7cb8" font-weight="700" letter-spacing="1.2">PLAINTEXT MESSAGE</text>
  <rect x="66" y="348" width="504" height="86" rx="8" fill="#14101f" stroke="#352b52"/>
  <text x="80" y="378" font-size="14.5" fill="#e8e0fb" font-family="'SF Mono','Menlo','Consolas',monospace">Hello 8gwifi.org</text>

  <!-- Submit button -->
  <rect x="66" y="458" width="504" height="48" rx="11" fill="url(#violet)"/>
  <rect x="240" y="475" width="13" height="10" rx="2" fill="#fff"/>
  <path d="M243 475 V472 a3.5 3.5 0 0 1 7 0 V475" fill="none" stroke="#fff" stroke-width="1.8"/>
  <text x="268" y="488" font-size="16" fill="#ffffff" font-weight="700">Encrypt Message</text>

  <!-- ============ RIGHT CARD: output ============ -->
  <rect x="620" y="126" width="540" height="406" rx="14" fill="#1c1530" stroke="#342a50"/>
  <rect x="620" y="126" width="540" height="46" rx="14" fill="#6d28d9"/>
  <rect x="620" y="158" width="540" height="14" fill="#6d28d9"/>
  <text x="646" y="156" font-size="17" fill="#ffffff" font-weight="700">Output</text>

  <!-- Token result -->
  <text x="646" y="208" font-size="12" fill="#8b7cb8" font-weight="700" letter-spacing="1.2">FERNET TOKEN</text>
  <rect x="646" y="216" width="488" height="72" rx="8" fill="#14101f" stroke="#352b52"/>
  <text x="662" y="244" font-size="13.5" fill="#f0a8d4" font-family="'SF Mono','Menlo','Consolas',monospace">gAAAAABl9Xy2Qm8vK3pR7nLtHm4cZx0w</text>
  <text x="662" y="270" font-size="13.5" fill="#f0a8d4" font-family="'SF Mono','Menlo','Consolas',monospace">YpE2sV8bN1dQ6jF5uG3iO7aP4rB0kS9==</text>

  <!-- Token structure -->
  <text x="646" y="328" font-size="12" fill="#8b7cb8" font-weight="700" letter-spacing="1.2">TOKEN STRUCTURE</text>
  <g>
    <rect x="646" y="340" width="48"  height="42" fill="#8b5cf6"/>
    <rect x="694" y="340" width="92"  height="42" fill="#a855f7"/>
    <rect x="786" y="340" width="70"  height="42" fill="#ec4899"/>
    <rect x="856" y="340" width="180" height="42" fill="#6366f1"/>
    <rect x="1036" y="340" width="98" height="42" fill="#f59e0b"/>
    <text x="670"  y="366" font-size="11.5" fill="#fff" text-anchor="middle" font-weight="600">0x80</text>
    <text x="740"  y="366" font-size="11.5" fill="#fff" text-anchor="middle" font-weight="600">Time</text>
    <text x="821"  y="366" font-size="11.5" fill="#fff" text-anchor="middle" font-weight="600">IV</text>
    <text x="946"  y="366" font-size="11.5" fill="#fff" text-anchor="middle" font-weight="600">Ciphertext</text>
    <text x="1085" y="366" font-size="11.5" fill="#fff" text-anchor="middle" font-weight="600">HMAC</text>
  </g>

  <!-- Legend -->
  <g font-size="12.5" fill="#a99bd0">
    <circle cx="652" cy="408" r="5" fill="#8b5cf6"/><text x="664" y="412">Version (8 bit)</text>
    <circle cx="780" cy="408" r="5" fill="#a855f7"/><text x="792" y="412">Timestamp (64 bit)</text>
    <circle cx="952" cy="408" r="5" fill="#ec4899"/><text x="964" y="412">IV (128 bit)</text>
    <circle cx="652" cy="434" r="5" fill="#6366f1"/><text x="664" y="438">Ciphertext &#183; AES-128-CBC</text>
    <circle cx="900" cy="434" r="5" fill="#f59e0b"/><text x="912" y="438">HMAC-SHA256 auth tag</text>
  </g>

  <rect x="646" y="466" width="488" height="46" rx="9" fill="#221a38"/>
  <text x="666" y="494" font-size="13" fill="#c4b6e8">Authenticated encryption — tampering is detected before decryption.</text>

  <!-- Footer -->
  <text x="600" y="604" font-size="16" fill="#7c6fa6" text-anchor="middle">8gwifi.org &#183; free Fernet tool &#183; generate keys, encrypt &amp; decrypt, inspect token fields</text>
</svg>
