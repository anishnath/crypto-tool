<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fefdfb"/>
      <stop offset="100%" stop-color="#f3eee5"/>
    </linearGradient>
    <radialGradient id="accentGlow" cx="0.30" cy="0.5" r="0.45">
      <stop offset="0%" stop-color="#6d5efc" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#6d5efc" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#6d5efc" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#1c1917" stroke-width="0.5" stroke-opacity="0.045"/>
    </pattern>
    <radialGradient id="sphereC" cx="0.35" cy="0.3" r="0.75">
      <stop offset="0%" stop-color="#9b8dff"/>
      <stop offset="100%" stop-color="#4b3fb0"/>
    </radialGradient>
    <radialGradient id="sphereO" cx="0.35" cy="0.3" r="0.75">
      <stop offset="0%" stop-color="#ff9a9a"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </radialGradient>
    <radialGradient id="sphereH" cx="0.35" cy="0.3" r="0.8">
      <stop offset="0%" stop-color="#f2f0fb"/>
      <stop offset="100%" stop-color="#b8b4d6"/>
    </radialGradient>
    <radialGradient id="spaceFill" cx="0.35" cy="0.3" r="0.8">
      <stop offset="0%" stop-color="#8b7bff" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#6d5efc" stop-opacity="0.12"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#accentGlow)"/>

  <!-- ── Left composition: formula → structure ── -->
  <g transform="translate(350 315)">
    <!-- faint orbit (3D hint) -->
    <ellipse cx="0" cy="78" rx="232" ry="150" fill="none" stroke="#6d5efc" stroke-opacity="0.16" stroke-width="1.5" stroke-dasharray="4 8"/>

    <!-- search-style formula pill -->
    <g transform="translate(0 -228)">
      <rect x="-150" y="-38" width="300" height="76" rx="38" fill="#fefdfb" stroke="#6d5efc" stroke-opacity="0.5" stroke-width="2"/>
      <text x="-18" y="11" text-anchor="middle" font-family="'JetBrains Mono','Courier New',monospace" font-size="34" font-weight="600" fill="#1c1917" letter-spacing="1">C₆H₁₂O₆</text>
      <circle cx="104" cy="0" r="15" fill="none" stroke="#6d5efc" stroke-width="3.2"/>
      <line x1="115" y1="11" x2="130" y2="26" stroke="#6d5efc" stroke-width="3.2" stroke-linecap="round"/>
    </g>

    <!-- arrow: formula → structure -->
    <g stroke="#6d5efc" stroke-opacity="0.55" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <line x1="0" y1="-172" x2="0" y2="-118"/>
      <polyline points="-13,-133 0,-118 13,-133"/>
    </g>

    <!-- molecule: benzene ring with 3D-sphere atoms + an -OH (Lewis dots) -->
    <g transform="translate(-18 40)">
      <!-- bonds -->
      <g stroke="#5b4fd6" stroke-width="4" stroke-linecap="round">
        <polygon points="0,-78 67.5,-39 67.5,39 0,78 -67.5,39 -67.5,-39" fill="none" stroke-opacity="0.85"/>
        <polygon points="0,-54 46.8,-27 46.8,27 0,54 -46.8,27 -46.8,-27" fill="none" stroke-opacity="0.4"/>
        <line x1="67.5" y1="-39" x2="120" y2="-68"/>
      </g>

      <!-- space-filling hint on one atom (3D) -->
      <circle cx="0" cy="78" r="34" fill="url(#spaceFill)"/>

      <!-- carbon atoms (3D spheres) -->
      <g>
        <circle cx="0" cy="-78" r="13" fill="url(#sphereC)"/>
        <circle cx="67.5" cy="-39" r="13" fill="url(#sphereC)"/>
        <circle cx="67.5" cy="39" r="13" fill="url(#sphereC)"/>
        <circle cx="0" cy="78" r="13" fill="url(#sphereC)"/>
        <circle cx="-67.5" cy="39" r="13" fill="url(#sphereC)"/>
        <circle cx="-67.5" cy="-39" r="13" fill="url(#sphereC)"/>
      </g>

      <!-- oxygen + lone-pair dots (Lewis hint) -->
      <circle cx="120" cy="-68" r="14" fill="url(#sphereO)"/>
      <g fill="#1c1917" fill-opacity="0.62">
        <circle cx="120" cy="-90" r="3.4"/>
        <circle cx="131" cy="-88" r="3.4"/>
        <circle cx="140" cy="-58" r="3.4"/>
        <circle cx="140" cy="-47" r="3.4"/>
      </g>
    </g>
  </g>

  <!-- ── Right: title block ── -->
  <g transform="translate(700 188)" font-family="'Inter',-apple-system,BlinkMacSystemFont,sans-serif">
    <rect x="0" y="0" width="56" height="4" rx="2" fill="#6d5efc"/>
    <text x="0" y="38" font-size="20" font-weight="600" fill="#6d5efc" letter-spacing="3">8GWIFI · CHEMISTRY</text>

    <text x="0" y="118" font-size="78" font-weight="700" fill="#1c1917" font-family="'Instrument Serif','Times New Roman',Georgia,serif" font-style="italic">Formula to</text>
    <text x="0" y="194" font-size="78" font-weight="700" fill="#1c1917" font-family="'Instrument Serif','Times New Roman',Georgia,serif" font-style="italic">structure.</text>

    <text x="0" y="252" font-size="22" fill="#44403c" font-weight="400">Type a formula → see every matching molecule.</text>
    <text x="0" y="284" font-size="22" fill="#44403c" font-weight="400">2D &amp; 3D · Lewis dots · SMILES · balancing.</text>

    <g transform="translate(0 320)">
      <g>
        <rect x="0" y="0" width="118" height="36" rx="18" fill="#6d5efc" fill-opacity="0.1" stroke="#6d5efc" stroke-opacity="0.28" stroke-width="1"/>
        <text x="59" y="24" text-anchor="middle" font-size="14" font-weight="600" fill="#5b4fd6">2D + 3D</text>
      </g>
      <g transform="translate(130 0)">
        <rect x="0" y="0" width="108" height="36" rx="18" fill="#6d5efc" fill-opacity="0.1" stroke="#6d5efc" stroke-opacity="0.28" stroke-width="1"/>
        <text x="54" y="24" text-anchor="middle" font-size="14" font-weight="600" fill="#5b4fd6">LEWIS</text>
      </g>
      <g transform="translate(250 0)">
        <rect x="0" y="0" width="118" height="36" rx="18" fill="#6d5efc" fill-opacity="0.1" stroke="#6d5efc" stroke-opacity="0.28" stroke-width="1"/>
        <text x="59" y="24" text-anchor="middle" font-size="14" font-weight="600" fill="#5b4fd6">SMILES</text>
      </g>
      <g transform="translate(380 0)">
        <rect x="0" y="0" width="120" height="36" rx="18" fill="#6d5efc" fill-opacity="0.1" stroke="#6d5efc" stroke-opacity="0.28" stroke-width="1"/>
        <text x="60" y="24" text-anchor="middle" font-size="14" font-weight="600" fill="#5b4fd6">BALANCE</text>
      </g>
    </g>
  </g>

  <!-- brand -->
  <g transform="translate(1130 595)" text-anchor="end" font-family="'JetBrains Mono','Courier New',monospace">
    <text font-size="16" fill="#1c1917" fill-opacity="0.55" font-weight="500">8gwifi.org/chemistry</text>
  </g>
</svg>
