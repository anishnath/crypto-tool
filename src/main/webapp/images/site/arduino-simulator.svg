<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="board" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d6e3a"/>
      <stop offset="100%" stop-color="#0a5c2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#06b6d4" stroke-width="1">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="0" y1="630" x2="1200" y2="0"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
  </g>

  <!-- Arduino board (simplified) -->
  <g transform="translate(80, 140)">
    <rect x="0" y="0" width="220" height="360" rx="8" fill="url(#board)" stroke="#0d4a22" stroke-width="2"/>
    <!-- USB -->
    <rect x="-5" y="30" width="30" height="50" rx="3" fill="#888" stroke="#666" stroke-width="1"/>
    <!-- Chip -->
    <rect x="60" y="120" width="100" height="100" rx="4" fill="#222" stroke="#444" stroke-width="1"/>
    <text x="110" y="175" text-anchor="middle" fill="#888" font-size="12" font-family="monospace">ATmega328p</text>
    <!-- Pin holes top -->
    <g fill="#1a1a2e" stroke="#d4a843" stroke-width="0.8">
      <circle cx="30" cy="15" r="4"/><circle cx="50" cy="15" r="4"/><circle cx="70" cy="15" r="4"/>
      <circle cx="90" cy="15" r="4"/><circle cx="110" cy="15" r="4"/><circle cx="130" cy="15" r="4"/>
      <circle cx="150" cy="15" r="4"/><circle cx="170" cy="15" r="4"/><circle cx="190" cy="15" r="4"/>
    </g>
    <!-- Pin holes bottom -->
    <g fill="#1a1a2e" stroke="#d4a843" stroke-width="0.8">
      <circle cx="30" cy="345" r="4"/><circle cx="50" cy="345" r="4"/><circle cx="70" cy="345" r="4"/>
      <circle cx="90" cy="345" r="4"/><circle cx="110" cy="345" r="4"/><circle cx="130" cy="345" r="4"/>
      <circle cx="150" cy="345" r="4"/><circle cx="170" cy="345" r="4"/><circle cx="190" cy="345" r="4"/>
    </g>
    <!-- LED -->
    <circle cx="180" cy="260" r="8" fill="#22ff22" opacity="0.9"/>
    <circle cx="180" cy="260" r="12" fill="#22ff22" opacity="0.15"/>
    <text x="110" y="310" text-anchor="middle" fill="#8fc" font-size="14" font-weight="bold" font-family="sans-serif">Arduino Uno</text>
  </g>

  <!-- Code editor panel -->
  <g transform="translate(380, 100)">
    <rect x="0" y="0" width="440" height="420" rx="8" fill="#1a1d24" stroke="#2d3139" stroke-width="1"/>
    <!-- Title bar -->
    <rect x="0" y="0" width="440" height="32" rx="8" fill="#14171c"/>
    <rect x="0" y="20" width="440" height="12" fill="#14171c"/>
    <circle cx="16" cy="16" r="5" fill="#ef4444"/>
    <circle cx="34" cy="16" r="5" fill="#eab308"/>
    <circle cx="52" cy="16" r="5" fill="#22c55e"/>
    <text x="220" y="20" text-anchor="middle" fill="#64748b" font-size="11" font-family="monospace">sketch.ino</text>

    <!-- Code lines -->
    <g font-family="'Fira Code', monospace" font-size="13">
      <text x="20" y="58" fill="#c084fc">void</text><text x="55" y="58" fill="#22d3ee"> setup</text><text x="105" y="58" fill="#e2e8f0">() {</text>
      <text x="36" y="78" fill="#e2e8f0">Serial.</text><text x="95" y="78" fill="#4ade80">begin</text><text x="140" y="78" fill="#e2e8f0">(</text><text x="148" y="78" fill="#f97316">115200</text><text x="200" y="78" fill="#e2e8f0">);</text>
      <text x="36" y="98" fill="#e2e8f0">pinMode(</text><text x="107" y="98" fill="#f97316">13</text><text x="120" y="98" fill="#e2e8f0">, OUTPUT);</text>
      <text x="20" y="118" fill="#e2e8f0">}</text>

      <text x="20" y="148" fill="#c084fc">void</text><text x="55" y="148" fill="#22d3ee"> loop</text><text x="95" y="148" fill="#e2e8f0">() {</text>
      <text x="36" y="168" fill="#e2e8f0">digitalWrite(</text><text x="145" y="168" fill="#f97316">13</text><text x="158" y="168" fill="#e2e8f0">, HIGH);</text>
      <text x="36" y="188" fill="#e2e8f0">Serial.</text><text x="95" y="188" fill="#4ade80">println</text><text x="155" y="188" fill="#e2e8f0">(</text><text x="162" y="188" fill="#fbbf24">"LED ON"</text><text x="228" y="188" fill="#e2e8f0">);</text>
      <text x="36" y="208" fill="#e2e8f0">delay(</text><text x="82" y="208" fill="#f97316">500</text><text x="108" y="208" fill="#e2e8f0">);</text>
      <text x="36" y="228" fill="#e2e8f0">digitalWrite(</text><text x="145" y="228" fill="#f97316">13</text><text x="158" y="228" fill="#e2e8f0">, LOW);</text>
      <text x="36" y="248" fill="#e2e8f0">delay(</text><text x="82" y="248" fill="#f97316">500</text><text x="108" y="248" fill="#e2e8f0">);</text>
      <text x="20" y="268" fill="#e2e8f0">}</text>
    </g>

    <!-- Serial monitor -->
    <rect x="0" y="300" width="440" height="120" rx="0" fill="#111318" stroke="#2d3139" stroke-width="1"/>
    <text x="12" y="320" fill="#64748b" font-size="11" font-family="sans-serif" font-weight="600">Serial Monitor</text>
    <g font-family="monospace" font-size="12" fill="#22c55e">
      <text x="12" y="342">LED ON</text>
      <text x="12" y="358">LED OFF</text>
      <text x="12" y="374">LED ON</text>
      <text x="12" y="390">LED OFF</text>
      <text x="12" y="406" fill="#06b6d4">ADC: 512 Voltage: 2.50V</text>
    </g>
  </g>

  <!-- Components panel -->
  <g transform="translate(880, 100)">
    <!-- LED red -->
    <circle cx="40" cy="40" r="16" fill="#ef4444" opacity="0.8"/>
    <circle cx="40" cy="40" r="22" fill="#ef4444" opacity="0.12"/>
    <text x="40" y="75" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="sans-serif">LED</text>

    <!-- Pot -->
    <circle cx="120" cy="40" r="18" fill="#334155" stroke="#64748b" stroke-width="2"/>
    <line x1="120" y1="24" x2="120" y2="38" stroke="#06b6d4" stroke-width="2" stroke-linecap="round"/>
    <text x="120" y="75" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="sans-serif">Pot</text>

    <!-- Servo -->
    <rect x="190" y="22" width="40" height="36" rx="4" fill="#334155" stroke="#64748b" stroke-width="1"/>
    <line x1="210" y1="22" x2="230" y2="8" stroke="#06b6d4" stroke-width="2" stroke-linecap="round"/>
    <text x="210" y="75" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="sans-serif">Servo</text>

    <!-- Button -->
    <rect x="22" y="110" width="36" height="36" rx="4" fill="#64748b" stroke="#94a3b8" stroke-width="1"/>
    <circle cx="40" cy="128" r="10" fill="#ef4444"/>
    <text x="40" y="163" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="sans-serif">Button</text>

    <!-- LCD -->
    <rect x="86" y="110" width="60" height="36" rx="3" fill="#1a3a1a" stroke="#22c55e" stroke-width="1"/>
    <text x="116" y="132" text-anchor="middle" fill="#22c55e" font-size="8" font-family="monospace">Hello!</text>
    <text x="116" y="163" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="sans-serif">LCD</text>

    <!-- Buzzer -->
    <circle cx="210" cy="128" r="18" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
    <circle cx="210" cy="128" r="6" fill="#334155"/>
    <text x="210" y="163" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="sans-serif">Buzzer</text>
  </g>

  <!-- Wires -->
  <g stroke-width="2" fill="none" opacity="0.6">
    <path d="M300 260 Q340 260 380 200" stroke="#22c55e"/>
    <path d="M300 340 Q340 340 380 300" stroke="#ef4444"/>
    <path d="M300 300 Q340 300 380 250" stroke="#3b82f6"/>
  </g>

  <!-- Board labels -->
  <g transform="translate(80, 530)">
    <rect x="0" y="0" width="70" height="24" rx="4" fill="#06b6d4" opacity="0.15"/>
    <text x="35" y="16" text-anchor="middle" fill="#06b6d4" font-size="10" font-weight="600" font-family="sans-serif">Uno</text>

    <rect x="80" y="0" width="70" height="24" rx="4" fill="#22c55e" opacity="0.15"/>
    <text x="115" y="16" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="600" font-family="sans-serif">Pico</text>

    <rect x="160" y="0" width="80" height="24" rx="4" fill="#a855f7" opacity="0.15"/>
    <text x="200" y="16" text-anchor="middle" fill="#a855f7" font-size="10" font-weight="600" font-family="sans-serif">ESP32</text>

    <rect x="250" y="0" width="90" height="24" rx="4" fill="#f97316" opacity="0.15"/>
    <text x="295" y="16" text-anchor="middle" fill="#f97316" font-size="10" font-weight="600" font-family="sans-serif">ESP32-C3</text>

    <rect x="350" y="0" width="80" height="24" rx="4" fill="#eab308" opacity="0.15"/>
    <text x="390" y="16" text-anchor="middle" fill="#eab308" font-size="10" font-weight="600" font-family="sans-serif">Pi 3B</text>
  </g>

  <!-- Title -->
  <text x="600" y="580" text-anchor="middle" fill="#e2e8f0" font-size="28" font-weight="700" font-family="'Sora', sans-serif" letter-spacing="-0.02em">Arduino &amp; ESP32 Simulator Online</text>
  <text x="600" y="610" text-anchor="middle" fill="#64748b" font-size="14" font-family="'DM Sans', sans-serif">Write, compile, and run Arduino code in your browser — 6 boards, 21 components, free</text>
</svg>
