<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="'Inter','Segoe UI',Roboto,sans-serif">
  <defs>
    <linearGradient id="board" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f522f"/>
      <stop offset="1" stop-color="#1b371b"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6b4a2f"/>
      <stop offset="1" stop-color="#422d18"/>
    </linearGradient>
    <radialGradient id="chalkglow" cx="0.3" cy="0.25" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Wood frame + chalkboard -->
  <rect width="1200" height="630" fill="url(#wood)"/>
  <rect x="20" y="20" width="1160" height="590" rx="10" fill="url(#board)" stroke="#13260f" stroke-width="2"/>
  <rect x="20" y="20" width="1160" height="590" rx="10" fill="url(#chalkglow)"/>

  <!-- Title -->
  <text x="72" y="120" font-size="66" font-weight="800" fill="#f5f5ee">Quick Math</text>
  <path d="M74 140 q70 -9 140 0 t140 0 t96 0" stroke="#ffd54f" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.92"/>
  <text x="74" y="180" font-size="24" fill="#bfe0bf">Mental-math speed drills &#183; step-by-step tricks &#183; free, no signup</text>

  <!-- Worked example 1 -->
  <text x="74" y="290" font-size="58" font-weight="700" fill="#f5f5ee">48 &#215; 25 = <tspan fill="#ffd54f">1200</tspan></text>
  <text x="74" y="334" font-size="29" fill="#81c784">trick:&#160; 48 &#247; 4 = 12&#160;&#160;&#8594;&#160;&#160;12 &#215; 100</text>

  <!-- Worked example 2 -->
  <text x="74" y="416" font-size="46" font-weight="700" fill="#f5f5ee">15% of 80 = <tspan fill="#ffd54f">12</tspan></text>
  <text x="74" y="456" font-size="27" fill="#81c784">trick:&#160; 10% = 8,&#160; 5% = 4,&#160; 8 + 4 = 12</text>

  <!-- Stat chips -->
  <g font-family="'JetBrains Mono','SF Mono',monospace">
    <rect x="74"  y="498" width="226" height="58" rx="29" fill="rgba(255,255,255,0.05)" stroke="#9cc49c" stroke-width="1.5"/>
    <text x="100" y="535" font-size="22" fill="#cfe8cf">STREAK </text><text x="205" y="535" font-size="24" font-weight="700" fill="#ffd54f">14</text>
    <rect x="318" y="498" width="270" height="58" rx="29" fill="rgba(255,255,255,0.05)" stroke="#9cc49c" stroke-width="1.5"/>
    <text x="344" y="535" font-size="22" fill="#cfe8cf">ACCURACY </text><text x="492" y="535" font-size="24" font-weight="700" fill="#7ec8ff">96%</text>
    <rect x="606" y="498" width="232" height="58" rx="29" fill="rgba(255,255,255,0.05)" stroke="#9cc49c" stroke-width="1.5"/>
    <text x="632" y="535" font-size="22" fill="#cfe8cf">BEST </text><text x="708" y="535" font-size="24" font-weight="700" fill="#7ee0b8">3.4s</text>
  </g>

  <!-- Topic strip + brand -->
  <text x="888" y="300" font-size="22" fill="#9cc49c" text-anchor="start">30+ topics:</text>
  <text x="888" y="334" font-size="20" fill="#cfe8cf">percentages, ratios,</text>
  <text x="888" y="362" font-size="20" fill="#cfe8cf">roots, series, pipes,</text>
  <text x="888" y="390" font-size="20" fill="#cfe8cf">profit &amp; loss, trig…</text>

  <text x="74" y="592" font-size="22" fill="#9cc49c">8gwifi.org &#183; free mental math practice</text>
  <text x="1126" y="592" font-size="22" font-weight="600" fill="#ffd54f" text-anchor="end">/math/quick-math</text>
</svg>
