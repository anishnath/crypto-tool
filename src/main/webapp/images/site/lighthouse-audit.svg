<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" rx="12" fill="#0f172a"/>
  <rect x="40" y="40" width="1120" height="550" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
