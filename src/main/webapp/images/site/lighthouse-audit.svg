  <rect x="340" y="330" width="100" height="65" rx="3" fill="#64748b" stroke="#64748b" stroke-width="1"/>
  <rect x="460" y="330" width="100" height="65" rx="3" fill="#94a3b8" stroke="#64748b" stroke-width="1"/>
  <rect x="580" y="330" width="100" height="65" rx="3" fill="#cbd5e1" stroke="#64748b" stroke-width="1"/>
  <rect x="700" y="330" width="100" height="65" rx="3" fill="#e2e8f0" stroke="#64748b" stroke-width="1"/>
  <!-- CWV metrics -->
