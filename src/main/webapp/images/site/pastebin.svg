<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#d1fae5"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" rx="12" fill="url(#bg)"/>

  <!-- Editor card -->
  <rect x="60" y="40" width="380" height="320" rx="10" fill="url(#card)" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Title bar -->
  <rect x="60" y="40" width="380" height="36" rx="10" fill="url(#accent)"/>
  <rect x="60" y="66" width="380" height="10" fill="url(#accent)"/>
  <circle cx="80" cy="58" r="5" fill="#fff" opacity="0.4"/>
  <circle cx="96" cy="58" r="5" fill="#fff" opacity="0.4"/>
  <circle cx="112" cy="58" r="5" fill="#fff" opacity="0.4"/>
  <text x="250" y="63" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="13" font-weight="600">New Paste</text>

  <!-- Code lines -->
  <rect x="80" y="90" width="120" height="8" rx="4" fill="#10b981" opacity="0.2"/>
  <rect x="80" y="108" width="200" height="8" rx="4" fill="#475569" opacity="0.15"/>
  <rect x="80" y="126" width="160" height="8" rx="4" fill="#475569" opacity="0.15"/>
  <rect x="80" y="144" width="240" height="8" rx="4" fill="#475569" opacity="0.15"/>
  <rect x="80" y="162" width="100" height="8" rx="4" fill="#10b981" opacity="0.2"/>
  <rect x="80" y="180" width="300" height="8" rx="4" fill="#475569" opacity="0.15"/>
  <rect x="80" y="198" width="180" height="8" rx="4" fill="#475569" opacity="0.15"/>
  <rect x="80" y="216" width="260" height="8" rx="4" fill="#475569" opacity="0.15"/>
  <rect x="80" y="234" width="140" height="8" rx="4" fill="#475569" opacity="0.15"/>

  <!-- Options bar -->
  <rect x="60" y="260" width="380" height="32" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.5"/>
  <rect x="76" y="268" width="60" height="16" rx="3" fill="#e2e8f0"/>
  <text x="106" y="280" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="9" font-weight="500">24h</text>
  <rect x="148" y="268" width="70" height="16" rx="3" fill="#e2e8f0"/>
  <text x="183" y="280" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="9" font-weight="500">Unlisted</text>
  <rect x="230" y="268" width="50" height="16" rx="3" fill="#e2e8f0"/>
  <text x="255" y="280" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="9" font-weight="500">JSON</text>

  <!-- Submit button -->
  <rect x="60" y="292" width="380" height="36" fill="#f1f5f9"/>
  <rect x="330" y="298" width="96" height="24" rx="6" fill="url(#accent)"/>
  <text x="378" y="314" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Create Paste</text>

  <!-- Bottom of card -->
  <rect x="60" y="328" width="380" height="32" rx="0" fill="url(#card)" stroke="#e2e8f0" stroke-width="0.5"/>
  <rect x="60" y="348" width="380" height="12" rx="0 0 10 10" fill="url(#card)"/>

  <!-- Tools sidebar -->
  <rect x="470" y="40" width="270" height="200" rx="10" fill="url(#card)" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="470" y="40" width="270" height="32" rx="10" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="0.5"/>
  <rect x="470" y="62" width="270" height="10" fill="#f1f5f9"/>
  <text x="492" y="61" fill="#64748b" font-family="system-ui,sans-serif" font-size="11" font-weight="700" letter-spacing="0.5">TOOLS</text>

  <!-- Tool buttons grid -->
  <rect x="486" y="84" width="72" height="22" rx="4" fill="#ecfdf5" stroke="#10b981" stroke-width="0.8"/>
  <text x="522" y="99" text-anchor="middle" fill="#059669" font-family="system-ui,sans-serif" font-size="9" font-weight="500">Base64</text>

  <rect x="566" y="84" width="72" height="22" rx="4" fill="#ecfdf5" stroke="#10b981" stroke-width="0.8"/>
  <text x="602" y="99" text-anchor="middle" fill="#059669" font-family="system-ui,sans-serif" font-size="9" font-weight="500">URL Enc</text>

  <rect x="646" y="84" width="72" height="22" rx="4" fill="#ecfdf5" stroke="#10b981" stroke-width="0.8"/>
  <text x="682" y="99" text-anchor="middle" fill="#059669" font-family="system-ui,sans-serif" font-size="9" font-weight="500">Hex</text>

  <rect x="486" y="114" width="72" height="22" rx="4" fill="#f0f9ff" stroke="#6366f1" stroke-width="0.8"/>
  <text x="522" y="129" text-anchor="middle" fill="#4f46e5" font-family="system-ui,sans-serif" font-size="9" font-weight="500">SHA-256</text>

  <rect x="566" y="114" width="72" height="22" rx="4" fill="#f0f9ff" stroke="#6366f1" stroke-width="0.8"/>
  <text x="602" y="129" text-anchor="middle" fill="#4f46e5" font-family="system-ui,sans-serif" font-size="9" font-weight="500">MD5</text>

  <rect x="646" y="114" width="72" height="22" rx="4" fill="#f0f9ff" stroke="#6366f1" stroke-width="0.8"/>
  <text x="682" y="129" text-anchor="middle" fill="#4f46e5" font-family="system-ui,sans-serif" font-size="9" font-weight="500">CRC32</text>

  <rect x="486" y="144" width="72" height="22" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="522" y="159" text-anchor="middle" fill="#d97706" font-family="system-ui,sans-serif" font-size="9" font-weight="500">JSON</text>

  <rect x="566" y="144" width="72" height="22" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="602" y="159" text-anchor="middle" fill="#d97706" font-family="system-ui,sans-serif" font-size="9" font-weight="500">YAML</text>

  <rect x="646" y="144" width="72" height="22" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="682" y="159" text-anchor="middle" fill="#d97706" font-family="system-ui,sans-serif" font-size="9" font-weight="500">CSV</text>

  <rect x="486" y="174" width="72" height="22" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="0.8"/>
  <text x="522" y="189" text-anchor="middle" fill="#dc2626" font-family="system-ui,sans-serif" font-size="9" font-weight="500">AES-256</text>

  <rect x="566" y="174" width="72" height="22" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="0.8"/>
  <text x="602" y="189" text-anchor="middle" fill="#dc2626" font-family="system-ui,sans-serif" font-size="9" font-weight="500">ROT13</text>

  <rect x="646" y="174" width="72" height="22" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="0.8"/>
  <text x="682" y="189" text-anchor="middle" fill="#dc2626" font-family="system-ui,sans-serif" font-size="9" font-weight="500">JWT</text>

  <text x="605" y="226" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">+ 80 more tools</text>

  <!-- Feature badges -->
  <rect x="470" y="260" width="130" height="44" rx="8" fill="url(#card)" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="535" y="279" text-anchor="middle" fill="#10b981" font-family="system-ui,sans-serif" font-size="11" font-weight="700">Encrypted</text>
  <text x="535" y="295" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="9">Passphrase protection</text>

  <rect x="610" y="260" width="130" height="44" rx="8" fill="url(#card)" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="675" y="279" text-anchor="middle" fill="#f59e0b" font-family="system-ui,sans-serif" font-size="11" font-weight="700">Burn Mode</text>
  <text x="675" y="295" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="9">Self-destructing paste</text>

  <rect x="470" y="314" width="130" height="44" rx="8" fill="url(#card)" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="535" y="333" text-anchor="middle" fill="#6366f1" font-family="system-ui,sans-serif" font-size="11" font-weight="700">Syntax HL</text>
  <text x="535" y="349" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="9">16 languages</text>

  <rect x="610" y="314" width="130" height="44" rx="8" fill="url(#card)" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="675" y="333" text-anchor="middle" fill="#059669" font-family="system-ui,sans-serif" font-size="11" font-weight="700">No Sign-up</text>
  <text x="675" y="349" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="9">100% free</text>
</svg>
