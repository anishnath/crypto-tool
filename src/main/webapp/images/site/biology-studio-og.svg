<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fefdfb"/>
      <stop offset="100%" stop-color="#f3eee5"/>
    </linearGradient>
    <radialGradient id="accentGlow" cx="0.32" cy="0.5" r="0.42">
      <stop offset="0%" stop-color="#2f7d54" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#2f7d54" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#2f7d54" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#1c1917" stroke-width="0.5" stroke-opacity="0.045"/>
    </pattern>
    <radialGradient id="cellBody" cx="0.38" cy="0.32" r="0.78">
      <stop offset="0%" stop-color="#bcd7af" stop-opacity="0.78"/>
      <stop offset="100%" stop-color="#7ea16e" stop-opacity="0.55"/>
    </radialGradient>
    <radialGradient id="nucleusGrad" cx="0.38" cy="0.36" r="0.7">
      <stop offset="0%" stop-color="#b67be0" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#5b3392" stop-opacity="0.9"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#accentGlow)"/>

  <!-- Left composition: stylised cell, organelle-aware -->
  <g transform="translate(370 315)">
    <!-- subtle orbits -->
    <circle r="240" fill="none" stroke="#2f7d54" stroke-opacity="0.18" stroke-width="1.5" stroke-dasharray="4 8"/>
    <circle r="172" fill="none" stroke="#1c1917" stroke-opacity="0.08" stroke-width="1"/>

    <!-- DNA helix satellite, above -->
    <g transform="translate(0 -270) scale(0.7)" stroke="#2f7d54" stroke-width="3" fill="none" stroke-opacity="0.7">
      <path d="M -90 -28 C -50 -50 -10 -50 30 -28 T 130 -28"/>
      <path d="M -90 28 C -50 6 -10 6 30 28 T 130 28"/>
      <line x1="-72" y1="-21" x2="-72" y2="22" stroke-opacity="0.55"/>
      <line x1="-30" y1="-30" x2="-30" y2="6" stroke-opacity="0.55"/>
      <line x1="10" y1="-30" x2="10" y2="6" stroke-opacity="0.55"/>
      <line x1="52" y1="-21" x2="52" y2="22" stroke-opacity="0.55"/>
      <line x1="94" y1="-30" x2="94" y2="6" stroke-opacity="0.55"/>
    </g>

    <!-- Cell membrane shell -->
    <circle r="200" fill="url(#cellBody)" stroke="#2f7d54" stroke-opacity="0.55" stroke-width="3"/>
    <circle r="200" fill="none" stroke="#fefdfb" stroke-opacity="0.45" stroke-width="1.5" stroke-dasharray="1 6"/>

    <!-- Nucleus -->
    <g>
      <circle cx="-26" cy="-18" r="62" fill="url(#nucleusGrad)"/>
      <circle cx="-12" cy="-30" r="15" fill="#d4a3f0" fill-opacity="0.92"/>
      <circle cx="-26" cy="-18" r="62" fill="none" stroke="#3d1e63" stroke-opacity="0.45" stroke-width="1.5" stroke-dasharray="2 3"/>
    </g>

    <!-- Mitochondria — capsules at varied angles -->
    <g transform="translate(70 70) rotate(35)">
      <rect x="-38" y="-13" width="76" height="26" rx="13" fill="#cf7042" fill-opacity="0.92"/>
      <rect x="-25" y="-8" width="6" height="16" fill="#f0b074" fill-opacity="0.78"/>
      <rect x="-12" y="-8" width="6" height="16" fill="#f0b074" fill-opacity="0.78"/>
      <rect x="1" y="-8" width="6" height="16" fill="#f0b074" fill-opacity="0.78"/>
      <rect x="14" y="-8" width="6" height="16" fill="#f0b074" fill-opacity="0.78"/>
    </g>
    <g transform="translate(-95 75) rotate(-25)">
      <rect x="-28" y="-10" width="56" height="20" rx="10" fill="#cf7042" fill-opacity="0.82"/>
      <rect x="-16" y="-6" width="5" height="12" fill="#f0b074" fill-opacity="0.7"/>
      <rect x="-4" y="-6" width="5" height="12" fill="#f0b074" fill-opacity="0.7"/>
      <rect x="8" y="-6" width="5" height="12" fill="#f0b074" fill-opacity="0.7"/>
    </g>

    <!-- Chloroplast — oblong with thylakoid hint -->
    <g transform="translate(82 -88) rotate(58)">
      <ellipse cx="0" cy="0" rx="40" ry="22" fill="#67ad46" fill-opacity="0.88"/>
      <circle cx="0" cy="0" r="18" fill="none" stroke="#9ed36a" stroke-opacity="0.78" stroke-width="2"/>
      <circle cx="-9" cy="-3" r="4" fill="#9ed36a" fill-opacity="0.6"/>
      <circle cx="9" cy="3" r="4" fill="#9ed36a" fill-opacity="0.6"/>
    </g>

    <!-- Vacuole -->
    <g>
      <circle cx="-110" cy="-50" r="36" fill="#62bdd2" fill-opacity="0.62"/>
      <circle cx="-110" cy="-50" r="36" fill="none" stroke="#3b8aa0" stroke-opacity="0.4" stroke-width="1.5"/>
    </g>

    <!-- Small organelle dots (ribosomes, vesicles) -->
    <circle cx="38" cy="-55" r="7" fill="#c76ac5" fill-opacity="0.78"/>
    <circle cx="-55" cy="105" r="8" fill="#c76ac5" fill-opacity="0.78"/>
    <circle cx="115" cy="-30" r="6" fill="#c76ac5" fill-opacity="0.78"/>
    <circle cx="0" cy="135" r="7" fill="#c76ac5" fill-opacity="0.78"/>
    <circle cx="135" cy="35" r="5" fill="#c76ac5" fill-opacity="0.78"/>
    <circle cx="-150" cy="20" r="6" fill="#c76ac5" fill-opacity="0.78"/>

    <!-- ER squiggle in the corner -->
    <path d="M -130 90 Q -90 70 -65 90 T -10 90" fill="none" stroke="#ce785c" stroke-opacity="0.55" stroke-width="3.5" stroke-linecap="round"/>
  </g>

  <!-- Right side: title block -->
  <g transform="translate(720 196)" font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif">
    <!-- accent bar -->
    <rect x="0" y="0" width="56" height="4" rx="2" fill="#2f7d54"/>

    <!-- eyebrow -->
    <text x="0" y="38" font-size="20" font-weight="600" fill="#2f7d54" letter-spacing="3">8GWIFI · BIOLOGY</text>

    <!-- title -->
    <text x="0" y="118" font-size="78" font-weight="700" fill="#1c1917" font-family="'Instrument Serif', 'Times New Roman', Georgia, serif" font-style="italic">12 cells, in 3D.</text>
    <text x="0" y="194" font-size="78" font-weight="700" fill="#1c1917" font-family="'Instrument Serif', 'Times New Roman', Georgia, serif" font-style="italic">Click any cell.</text>

    <!-- description -->
    <text x="0" y="252" font-size="22" fill="#44403c" font-weight="400">Plant · Animal · Neuron · Virus · 8 more</text>
    <text x="0" y="284" font-size="22" fill="#44403c" font-weight="400">Real microscopy · AI tutor · Free</text>

    <!-- chip row -->
    <g transform="translate(0 320)">
      <g>
        <rect x="0" y="0" width="148" height="36" rx="18" fill="#2f7d54" fill-opacity="0.1" stroke="#2f7d54" stroke-opacity="0.28" stroke-width="1"/>
        <text x="74" y="24" text-anchor="middle" font-size="14" font-weight="600" fill="#2f7d54">PLANT</text>
      </g>
      <g transform="translate(160 0)">
        <rect x="0" y="0" width="148" height="36" rx="18" fill="#2f7d54" fill-opacity="0.1" stroke="#2f7d54" stroke-opacity="0.28" stroke-width="1"/>
        <text x="74" y="24" text-anchor="middle" font-size="14" font-weight="600" fill="#2f7d54">NEURON</text>
      </g>
      <g transform="translate(0 48)">
        <rect x="0" y="0" width="148" height="36" rx="18" fill="#2f7d54" fill-opacity="0.1" stroke="#2f7d54" stroke-opacity="0.28" stroke-width="1"/>
        <text x="74" y="24" text-anchor="middle" font-size="14" font-weight="600" fill="#2f7d54">RED BLOOD</text>
      </g>
      <g transform="translate(160 48)">
        <rect x="0" y="0" width="148" height="36" rx="18" fill="#2f7d54" fill-opacity="0.1" stroke="#2f7d54" stroke-opacity="0.28" stroke-width="1"/>
        <text x="74" y="24" text-anchor="middle" font-size="14" font-weight="600" fill="#2f7d54">VIRUS</text>
      </g>
    </g>
  </g>

  <!-- bottom-right brand mark -->
  <g transform="translate(1130 595)" text-anchor="end" font-family="'JetBrains Mono', 'Courier New', monospace">
    <text font-size="16" fill="#1c1917" fill-opacity="0.55" font-weight="500">8gwifi.org/biology</text>
  </g>
</svg>
