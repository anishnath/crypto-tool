<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="lens1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#0ea5e9" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="lens2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#a78bfa" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#334155" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="100" y1="100" x2="100" y2="530"/>
    <line x1="200" y1="100" x2="200" y2="530"/>
    <line x1="300" y1="100" x2="300" y2="530"/>
    <line x1="400" y1="100" x2="400" y2="530"/>
    <line x1="500" y1="100" x2="500" y2="530"/>
    <line x1="600" y1="100" x2="600" y2="530"/>
    <line x1="700" y1="100" x2="700" y2="530"/>
    <line x1="800" y1="100" x2="800" y2="530"/>
    <line x1="900" y1="100" x2="900" y2="530"/>
  </g>

  <!-- Optical axis -->
  <line x1="80" y1="315" x2="920" y2="315" stroke="#475569" stroke-width="1.5" stroke-dasharray="8,5"/>

  <!-- Lens 1: Biconvex (crown glass) -->
  <path d="M 320,175 Q 340,315 320,455" fill="none" stroke="#38bdf8" stroke-width="2.5"/>
  <path d="M 360,175 Q 340,315 360,455" fill="none" stroke="#38bdf8" stroke-width="2.5"/>
  <line x1="320" y1="175" x2="360" y2="175" stroke="#38bdf8" stroke-width="2"/>
  <line x1="320" y1="455" x2="360" y2="455" stroke="#38bdf8" stroke-width="2"/>
  <path d="M 320,175 Q 340,315 320,455 L 360,455 Q 340,315 360,175 Z" fill="url(#lens1)"/>

  <!-- Lens 2: Flint element (cemented) -->
  <path d="M 360,185 Q 345,315 360,445" fill="none" stroke="#a78bfa" stroke-width="2.5"/>
  <path d="M 390,185 Q 375,315 390,445" fill="none" stroke="#a78bfa" stroke-width="2.5"/>
  <line x1="360" y1="185" x2="390" y2="185" stroke="#a78bfa" stroke-width="2"/>
  <line x1="360" y1="445" x2="390" y2="445" stroke="#a78bfa" stroke-width="2"/>
  <path d="M 360,185 Q 345,315 360,445 L 390,445 Q 375,315 390,185 Z" fill="url(#lens2)"/>

  <!-- Lens 3: Second group -->
  <path d="M 560,195 Q 580,315 560,435" fill="none" stroke="#38bdf8" stroke-width="2.5"/>
  <path d="M 600,195 Q 580,315 600,435" fill="none" stroke="#38bdf8" stroke-width="2.5"/>
  <line x1="560" y1="195" x2="600" y2="195" stroke="#38bdf8" stroke-width="2"/>
  <line x1="560" y1="435" x2="600" y2="435" stroke="#38bdf8" stroke-width="2"/>
  <path d="M 560,195 Q 580,315 560,435 L 600,435 Q 580,315 600,195 Z" fill="url(#lens1)"/>

  <!-- Rays: on-axis beam (green) -->
  <g stroke="#22c55e" stroke-width="1.5" opacity="0.85">
    <line x1="100" y1="265" x2="330" y2="265"/>
    <line x1="330" y1="265" x2="375" y2="272"/>
    <line x1="375" y1="272" x2="575" y2="290"/>
    <line x1="575" y1="290" x2="850" y2="315"/>

    <line x1="100" y1="315" x2="330" y2="315"/>
    <line x1="330" y1="315" x2="375" y2="315"/>
    <line x1="375" y1="315" x2="575" y2="315"/>
    <line x1="575" y1="315" x2="850" y2="315"/>

    <line x1="100" y1="365" x2="330" y2="365"/>
    <line x1="330" y1="365" x2="375" y2="358"/>
    <line x1="375" y1="358" x2="575" y2="340"/>
    <line x1="575" y1="340" x2="850" y2="315"/>
  </g>

  <!-- Rays: off-axis beam (amber/orange) -->
  <g stroke="#f59e0b" stroke-width="1.5" opacity="0.75">
    <line x1="100" y1="225" x2="330" y2="235"/>
    <line x1="330" y1="235" x2="375" y2="248"/>
    <line x1="375" y1="248" x2="575" y2="275"/>
    <line x1="575" y1="275" x2="850" y2="360"/>

    <line x1="100" y1="275" x2="330" y2="285"/>
    <line x1="330" y1="285" x2="375" y2="292"/>
    <line x1="375" y1="292" x2="575" y2="305"/>
    <line x1="575" y1="305" x2="850" y2="358"/>

    <line x1="100" y1="325" x2="330" y2="335"/>
    <line x1="330" y1="335" x2="375" y2="338"/>
    <line x1="375" y1="338" x2="575" y2="335"/>
    <line x1="575" y1="335" x2="850" y2="355"/>
  </g>

  <!-- Image plane -->
  <line x1="850" y1="200" x2="850" y2="430" stroke="#a78bfa" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Focal point dots -->
  <circle cx="850" cy="315" r="5" fill="#22c55e"/>
  <circle cx="850" cy="358" r="5" fill="#f59e0b"/>

  <!-- Surface labels -->
  <text x="340" y="165" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#64748b" font-weight="600">S1-S2</text>
  <text x="375" y="165" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#64748b" font-weight="600">S3</text>
  <text x="580" y="185" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#64748b" font-weight="600">S4-S5</text>
  <text x="850" y="190" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#a78bfa" font-weight="600">Image</text>

  <!-- Title -->
  <text x="600" y="560" text-anchor="middle" font-family="Inter, sans-serif" font-size="32" fill="#e2e8f0" font-weight="700">Optical Designer</text>
  <text x="600" y="590" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" fill="#94a3b8">Multi-Surface Lens Design &amp; Sequential Ray Tracing</text>

  <!-- Brand -->
  <text x="1160" y="610" text-anchor="end" font-family="Inter, sans-serif" font-size="14" fill="#475569" font-weight="600">8gwifi.org</text>

  <!-- Metrics badge top-right -->
  <rect x="940" y="120" width="220" height="180" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="960" y="148" font-family="Inter, sans-serif" font-size="11" fill="#64748b" font-weight="700" text-transform="uppercase" letter-spacing="0.05em">SYSTEM METRICS</text>
  <line x1="950" y1="158" x2="1150" y2="158" stroke="#334155" stroke-width="1"/>
  <text x="960" y="180" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">Focal Length</text>
  <text x="1150" y="180" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="13" fill="#22c55e" font-weight="600">95.2 mm</text>
  <text x="960" y="205" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">f-Number</text>
  <text x="1150" y="205" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="13" fill="#22c55e" font-weight="600">f/4.76</text>
  <text x="960" y="230" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">NA</text>
  <text x="1150" y="230" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="13" fill="#22c55e" font-weight="600">0.1048</text>
  <text x="960" y="255" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">Total Length</text>
  <text x="1150" y="255" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="13" fill="#22c55e" font-weight="600">128.5 mm</text>
  <text x="960" y="280" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">Axial CA</text>
  <text x="1150" y="280" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="13" fill="#f59e0b" font-weight="600">0.24 mm</text>
</svg>
