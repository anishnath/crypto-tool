<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c1220"/>
      <stop offset="100%" stop-color="#121a2e"/>
    </linearGradient>
    <linearGradient id="rose" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#4ec9f5"/>
    </linearGradient>
    <filter id="glow-ray1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-ray2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-ray3" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-lens" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-dot" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#4ec9f5" stroke-width="0.5">
    <line x1="0" y1="44" x2="1200" y2="44"/><line x1="0" y1="88" x2="1200" y2="88"/>
    <line x1="0" y1="132" x2="1200" y2="132"/><line x1="0" y1="176" x2="1200" y2="176"/>
    <line x1="0" y1="220" x2="1200" y2="220"/><line x1="0" y1="264" x2="1200" y2="264"/>
    <line x1="0" y1="308" x2="1200" y2="308"/><line x1="0" y1="352" x2="1200" y2="352"/>
    <line x1="0" y1="396" x2="1200" y2="396"/><line x1="0" y1="440" x2="1200" y2="440"/>
    <line x1="0" y1="484" x2="1200" y2="484"/><line x1="0" y1="528" x2="1200" y2="528"/>
    <line x1="44" y1="0" x2="44" y2="570"/><line x1="88" y1="0" x2="88" y2="570"/>
    <line x1="132" y1="0" x2="132" y2="570"/><line x1="176" y1="0" x2="176" y2="570"/>
    <line x1="220" y1="0" x2="220" y2="570"/><line x1="264" y1="0" x2="264" y2="570"/>
    <line x1="308" y1="0" x2="308" y2="570"/><line x1="352" y1="0" x2="352" y2="570"/>
    <line x1="396" y1="0" x2="396" y2="570"/><line x1="440" y1="0" x2="440" y2="570"/>
    <line x1="484" y1="0" x2="484" y2="570"/><line x1="528" y1="0" x2="528" y2="570"/>
    <line x1="572" y1="0" x2="572" y2="570"/><line x1="616" y1="0" x2="616" y2="570"/>
    <line x1="660" y1="0" x2="660" y2="570"/><line x1="704" y1="0" x2="704" y2="570"/>
    <line x1="748" y1="0" x2="748" y2="570"/><line x1="792" y1="0" x2="792" y2="570"/>
    <line x1="836" y1="0" x2="836" y2="570"/><line x1="880" y1="0" x2="880" y2="570"/>
    <line x1="924" y1="0" x2="924" y2="570"/><line x1="968" y1="0" x2="968" y2="570"/>
    <line x1="1012" y1="0" x2="1012" y2="570"/><line x1="1056" y1="0" x2="1056" y2="570"/>
    <line x1="1100" y1="0" x2="1100" y2="570"/><line x1="1144" y1="0" x2="1144" y2="570"/>
  </g>

  <!-- ========== Ray Diagram Area ========== -->
  <g transform="translate(40, 30)">
    <!-- Diagram frame -->
    <rect width="1120" height="480" rx="12" fill="#0e1825" stroke="#1a2f48" stroke-width="1.5"/>

    <!-- Optical axis (dashed) -->
    <line x1="40" y1="240" x2="1080" y2="240" stroke="#1a2f48" stroke-width="1.2" stroke-dasharray="12,8"/>

    <!-- Lens center line (dashed) -->
    <line x1="560" y1="40" x2="560" y2="440" stroke="#162030" stroke-width="1" stroke-dasharray="5,5"/>

    <!-- ===== Principal Rays ===== -->

    <!-- Ray 1: Orange — parallel then through F -->
    <g filter="url(#glow-ray1)">
      <!-- Incoming: horizontal from object to lens -->
      <line x1="240" y1="140" x2="560" y2="140" stroke="#ff6b35" stroke-width="2.2" stroke-linecap="round"/>
      <!-- Mid arrow on incoming -->
      <polygon points="410,134 398,140 410,146" fill="#ff6b35"/>
      <!-- Outgoing: from lens to image -->
      <line x1="560" y1="140" x2="850" y2="340" stroke="#ff6b35" stroke-width="2.2" stroke-linecap="round"/>
      <!-- Mid arrow on outgoing -->
      <polygon points="718,254 704,250 710,264" fill="#ff6b35"/>
    </g>

    <!-- Ray 2: Cyan — through center (undeviated) -->
    <g filter="url(#glow-ray2)">
      <line x1="240" y1="140" x2="850" y2="340" stroke="#4ec9f5" stroke-width="2.2" stroke-linecap="round"/>
      <!-- Mid arrow -->
      <polygon points="530,230 518,224 520,238" fill="#4ec9f5"/>
    </g>

    <!-- Ray 3: Green — through F' then parallel -->
    <g filter="url(#glow-ray3)">
      <!-- Incoming: from object toward F' -->
      <line x1="240" y1="140" x2="560" y2="300" stroke="#3de8b0" stroke-width="2.2" stroke-linecap="round"/>
      <!-- Mid arrow -->
      <polygon points="410,226 396,220 402,234" fill="#3de8b0"/>
      <!-- Outgoing: horizontal from lens -->
      <line x1="560" y1="300" x2="1060" y2="300" stroke="#3de8b0" stroke-width="2.2" stroke-linecap="round"/>
      <!-- Mid arrow -->
      <polygon points="780,294 768,300 780,306" fill="#3de8b0"/>
    </g>

    <!-- ===== Biconvex Lens ===== -->
    <g filter="url(#glow-lens)">
      <!-- Left surface (curves left = outward) -->
      <path d="M 552,80 Q 530,240 552,400" stroke="#4ec9f5" stroke-width="2.2" fill="none" stroke-linecap="round"/>
      <!-- Right surface (curves right = outward) -->
      <path d="M 568,80 Q 590,240 568,400" stroke="#4ec9f5" stroke-width="2.2" fill="none" stroke-linecap="round"/>
      <!-- Top edge -->
      <line x1="552" y1="80" x2="568" y2="80" stroke="#4ec9f5" stroke-width="2.2"/>
      <!-- Bottom edge -->
      <line x1="552" y1="400" x2="568" y2="400" stroke="#4ec9f5" stroke-width="2.2"/>
    </g>
    <!-- Lens fill -->
    <path d="M 552,80 Q 530,240 552,400 L 568,400 Q 590,240 568,80 Z" fill="#4ec9f5" opacity="0.06"/>
    <!-- Converging arrows at tips -->
    <polygon points="560,72 554,84 566,84" fill="#4ec9f5" opacity="0.7"/>
    <polygon points="560,408 554,396 566,396" fill="#4ec9f5" opacity="0.7"/>

    <!-- Label -->
    <text x="560" y="56" text-anchor="middle" fill="#4ec9f5" font-family="'Inter', sans-serif" font-size="11" font-weight="600" opacity="0.6">Biconvex Lens</text>

    <!-- ===== Focal Points ===== -->
    <!-- F (right) -->
    <g filter="url(#glow-dot)">
      <circle cx="720" cy="240" r="5" fill="#f7c948"/>
    </g>
    <line x1="720" y1="232" x2="720" y2="248" stroke="#f7c948" stroke-width="1.5"/>
    <text x="720" y="264" text-anchor="middle" fill="#f7c948" font-family="'Inter', sans-serif" font-size="12" font-weight="700">F</text>

    <!-- F' (left) -->
    <circle cx="400" cy="240" r="4" fill="#f7c948" opacity="0.5"/>
    <line x1="400" y1="233" x2="400" y2="247" stroke="#f7c948" stroke-width="1" opacity="0.5"/>
    <text x="400" y="264" text-anchor="middle" fill="#f7c948" font-family="'Inter', sans-serif" font-size="12" font-weight="600" opacity="0.5">F'</text>

    <!-- ===== Object Arrow ===== -->
    <line x1="240" y1="240" x2="240" y2="142" stroke="#ffffff" stroke-width="2.8" stroke-linecap="round"/>
    <polygon points="240,134 233,148 247,148" fill="#ffffff"/>
    <circle cx="240" cy="240" r="3.5" fill="#ffffff"/>
    <text x="240" y="124" text-anchor="middle" fill="#6b8fae" font-family="'Inter', sans-serif" font-size="11" font-weight="600">Object</text>

    <!-- ===== Image Arrow (Real, Inverted) ===== -->
    <line x1="850" y1="240" x2="850" y2="338" stroke="#3b82f6" stroke-width="2.8" stroke-linecap="round"/>
    <polygon points="850,346 843,332 857,332" fill="#3b82f6"/>
    <circle cx="850" cy="240" r="3.5" fill="#3b82f6"/>
    <!-- Convergence glow dot -->
    <g filter="url(#glow-dot)">
      <circle cx="850" cy="340" r="5" fill="#3b82f6"/>
    </g>
    <text x="850" y="372" text-anchor="middle" fill="#3b82f6" font-family="'Inter', sans-serif" font-size="10" font-weight="600" opacity="0.7">Real</text>
    <text x="850" y="386" text-anchor="middle" fill="#3b82f6" font-family="'Inter', sans-serif" font-size="10" font-weight="600" opacity="0.7">Image</text>

    <!-- ===== Distance Brackets ===== -->
    <!-- u bracket -->
    <line x1="240" y1="420" x2="240" y2="430" stroke="#a0c4ff" stroke-width="1.2"/>
    <line x1="560" y1="420" x2="560" y2="430" stroke="#a0c4ff" stroke-width="1.2"/>
    <line x1="240" y1="425" x2="560" y2="425" stroke="#a0c4ff" stroke-width="1.2"/>
    <text x="400" y="445" text-anchor="middle" fill="#a0c4ff" font-family="'JetBrains Mono', monospace" font-size="11">u = 20 cm</text>

    <!-- v bracket -->
    <line x1="560" y1="448" x2="560" y2="458" stroke="#f7c948" stroke-width="1.2"/>
    <line x1="850" y1="448" x2="850" y2="458" stroke="#f7c948" stroke-width="1.2"/>
    <line x1="560" y1="453" x2="850" y2="453" stroke="#f7c948" stroke-width="1.2"/>
    <text x="705" y="472" text-anchor="middle" fill="#f7c948" font-family="'JetBrains Mono', monospace" font-size="11">|v| = 20 cm</text>

    <!-- Axis direction arrow (right edge) -->
    <g opacity="0.25">
      <line x1="1020" y1="240" x2="1060" y2="240" stroke="#2e4460" stroke-width="1"/>
      <polygon points="1060,240 1052,236 1052,244" fill="#2e4460"/>
    </g>
    <text x="1016" y="230" text-anchor="end" fill="#2e4460" font-family="'Inter', sans-serif" font-size="9" opacity="0.7">Optical Axis</text>

    <!-- Ray legend (bottom-left corner) -->
    <g transform="translate(50, 410)">
      <rect width="180" height="60" rx="6" fill="#0c1220" stroke="#1a2f48" opacity="0.95"/>
      <line x1="10" y1="16" x2="26" y2="16" stroke="#ff6b35" stroke-width="2"/>
      <text x="32" y="20" fill="#d1d5db" font-family="'Inter', sans-serif" font-size="9">Parallel ray</text>
      <line x1="10" y1="32" x2="26" y2="32" stroke="#4ec9f5" stroke-width="2"/>
      <text x="32" y="36" fill="#d1d5db" font-family="'Inter', sans-serif" font-size="9">Central ray</text>
      <line x1="10" y1="48" x2="26" y2="48" stroke="#3de8b0" stroke-width="2"/>
      <text x="32" y="52" fill="#d1d5db" font-family="'Inter', sans-serif" font-size="9">Focal ray</text>

      <!-- Badges -->
      <rect x="100" y="8" width="34" height="16" rx="8" fill="#1e3a5f"/>
      <text x="117" y="19" text-anchor="middle" fill="#3b82f6" font-family="'Inter', sans-serif" font-size="8" font-weight="600">Real</text>
      <rect x="138" y="8" width="34" height="16" rx="8" fill="#3b1f1f"/>
      <text x="155" y="19" text-anchor="middle" fill="#f87171" font-family="'Inter', sans-serif" font-size="8" font-weight="600">Inv.</text>
    </g>
  </g>

  <!-- ========== Bottom branding bar ========== -->
  <rect y="526" width="1200" height="104" fill="#080d18"/>

  <!-- Equation -->
  <text x="600" y="556" text-anchor="middle" fill="#4ec9f5" font-family="'JetBrains Mono', monospace" font-size="22" font-weight="600" opacity="0.4">1/f  =  1/u  +  1/v</text>

  <!-- Tool name -->
  <text x="80" y="598" fill="#e11d48" font-family="'Inter', sans-serif" font-size="22" font-weight="800">Lens &amp; Mirror Calculator</text>
  <text x="382" y="598" fill="#2e4460" font-family="sans-serif" font-size="16">|</text>
  <text x="400" y="598" fill="#6b8fae" font-family="'Inter', sans-serif" font-size="14">7 Optical Elements  &bull;  Ray Diagrams  &bull;  Step-by-Step Solutions</text>

  <!-- 8gwifi.org -->
  <text x="1120" y="598" text-anchor="end" fill="#2e4460" font-family="'Inter', sans-serif" font-size="16" font-weight="700">8gwifi.org</text>

  <!-- Top accent line (rose gradient) -->
  <rect y="0" width="1200" height="3" fill="url(#rose)"/>
</svg>
